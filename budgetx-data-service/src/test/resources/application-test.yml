spring:
  datasource:
    url: 'jdbc:h2:mem:budgetx_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL'
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
budgetx:
  encryption:
    key: "12345678901234567890123456789012"
  security:
    jwt:
      secret: "super-secret-key-for-development-must-be-very-long"
      expiration-ms: 2592000000

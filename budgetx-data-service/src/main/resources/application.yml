spring:
  application:
    name: budgetx-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/budgetx}
    username: ${SPRING_DATASOURCE_USERNAME:budgetx}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
  flyway:
    enabled: true
    baseline-on-migrate: true

budgetx:
  security:
    jwt:
      secret: ${JWT_SECRET:super-secret-key-for-development-must-be-very-long-and-secure}
      expiration-ms: 2592000000 # 30 days in ms
  encryption:
    key: ${ENCRYPTION_KEY:12345678901234567890123456789012} # 32 chars for AES-256
